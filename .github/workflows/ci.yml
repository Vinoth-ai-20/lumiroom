name: Lumiroom CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json placeholder
        run: |
          echo '{"project_info":{"project_number":"000","project_id":"lumiroom-dev","storage_bucket":"lumiroom-dev.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000:android:000","android_client_info":{"package_name":"com.lumiroom.app"}},"oauth_client":[],"api_key":[{"current_key":"placeholder"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Android Lint
        run: ./gradlew lintDebug || true

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest || true

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumiroom-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
